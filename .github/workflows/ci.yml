name: "Revision de MarkDown"

on:
  push:
    # Se ejecuta cada vez que hacemos push en estas ramas
    branches: [ "main", "feature/**", "docs/**" ]
  pull_request:
    # Se ejecuta en cada pull request hacia la rama principal
    branches: [ "main" ]

jobs:
  build-and-push:
    name: "Build Docker Image & Push"
    runs-on: ubuntu-latest
    
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Set up JDK 21"
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: "Login to Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      #instala un constructor avanzado (BuildKit). Este es el que permite que el proceso sea rápido y use "caché inteligente" en la nube.
      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
      - name: "Extract Metadata"
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/suscripciones-api
          tags: |
            type=raw,value=latest
            type=sha,value={{sha}}

      - name: "Build and Push Image"
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          # Optimizamos el build usando cache nativo de GitHub
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: "Finalización Exitosa"
        run: echo "🚀 Imagen subida a Docker Hub ${{ secrets.DOCKERHUB_USERNAME }}/suscripciones-api:latest"