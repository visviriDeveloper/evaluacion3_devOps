name: "Revision de MarkDown"

on:
  push:
    # Se ejecuta cada vez que hacemos push en estas ramas
    branches: [ "main", "feature/**", "docs/**" ]
  pull_request:
    # Se ejecuta en cada pull request hacia la rama principal
    branches: [ "main" ]

jobs:
  build-and-push:
    name: "Build Docker Image & Push"
    runs-on: ubuntu-latest
    
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Set up JDK 21"
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: "Test and Analyze with SonarCloud"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Proveído automáticamente por GitHub
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}   
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=TU_ORGANIZACION_rentacar -Dsonar.qualitygate.wait=true

      - name: "Login to Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
     
      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          
      - name: "Extract Metadata"
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/rentacar
          tags: |
            type=raw,value=latest
            type=sha,value={{sha}}

      - name: "Build and Push Image to Docker Hub"
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          # Optimizamos el build usando cache nativo de GitHub
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: "Finalización Exitosa Docker Hub"
        run: echo "🚀 Imagen subida a Docker Hub ${{ secrets.DOCKERHUB_USERNAME }}/rentacar:latest"

      # --- 2. SECCIÓN AWS (ECR + ECS) ---
      - name: "Configurar credenciales AWS"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: "Login en Amazon ECR"
        uses: aws-actions/amazon-ecr-login@v1

      - name: "Build imagen y push a ECR"
        run: |
          docker build -t rentacar-api .
          docker tag rentacar-api:latest ${{ secrets.ECR_REPO_URL_RENTACAR }}:latest
          docker push ${{ secrets.ECR_REPO_URL_RENTACAR }}:latest

      - name: "Descargar Task Definition actual"
        run: |
          aws ecs describe-task-definition --task-definition ${{ secrets.ECS_TASK_DEFINITION_NAME }} --query taskDefinition > task-definition.json

      - name: "Actualizar Tag de la imagen en la Task Def"
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: rentacar-container  # Nombre exacto que configuraste en el contenedor de ECS
          image: ${{ secrets.ECR_REPO_URL_RENTACAR }}:latest

      - name: "Desplegar nueva Task Definition en el Servicio"
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ secrets.ECS_SERVICE_NAME }}
          cluster: ${{ secrets.ECS_CLUSTER_NAME }}
          wait-for-service-stability: true
          
      - name: "Finalización Exitosa AWS"
        run: echo "☁️ Despliegue completado exitosamente en AWS ECS Fargate"