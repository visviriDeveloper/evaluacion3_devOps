version: '3.8'
services:
  app-spring:
    build:
      context: .
    container_name: mi-spring-app
    working_dir: /app
    command: java -jar /app/app.jar
    volumes:
      - ./logs:/app/logs
    ports:
  # Puerto host:contenedor
      - "8080:8080"
    networks:
      - monitoring-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  promtail:
    image: grafana/promtail:latest
    volumes:
      # Promtail lee la MISMA carpeta física del host
      - ./logs:/var/log/app
      - ./promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks: [ monitoring-net ]
    depends_on: [ loki]

  loki:
    image: grafana/loki:2.9.0
    ports: [ "3100:3100" ]
    networks: [ loki-net ]

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
    # Inyectamos nuestra configuración personalizada
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - monitoring-net


  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
    networks: [ monitoring-net ]


networks:
  monitoring-net:
    driver: bridge